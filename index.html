<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서수원 JLS 단어장</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f6fa;
      color: #111;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 30px;
    }
    .subtxt {
      color: #666;
      font-size: 14px;
      margin-bottom: 18px;
    }
    .panel {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .filters {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 700;
    }
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d8dee8;
      font-size: 15px;
      background: #fff;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      font-size: 14px;
      color: #444;
      font-weight: 700;
    }
    .card {
      min-height: 300px;
      border-radius: 20px;
      background: #fff;
      box-shadow: inset 0 0 0 1px #edf1f7, 0 8px 24px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      user-select: none;
    }
    .card-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }
    .card-main {
      font-size: 40px;
      font-weight: 800;
      line-height: 1.35;
      word-break: keep-all;
    }
    .card-sub {
      margin-top: 10px;
      font-size: 16px;
      color: #666;
      font-weight: 600;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      border: 0;
      background: #111;
      color: #fff;
      padding: 13px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button.sub {
      background: #e9edf3;
      color: #111;
    }
    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #666;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 760px) {
      .filters {
        grid-template-columns: 1fr;
      }
      .card-main {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>서수원 JLS 단어장</h1>
    <div class="subtxt">처음엔 전체 단어가 다 뜨고, 필요할 때만 필터로 좁혀본다.</div>

    <div class="panel">
      <div class="filters">
        <div class="field">
          <label for="bookFilter">교재</label>
          <select id="bookFilter"></select>
        </div>
        <div class="field">
          <label for="levelFilter">레벨</label>
          <select id="levelFilter"></select>
        </div>
        <div class="field">
          <label for="chapterFilter">Chapter</label>
          <select id="chapterFilter"></select>
        </div>
      </div>

      <div class="meta">
        <div id="resultText">전체 단어 0개</div>
        <div id="countText">0 / 0</div>
      </div>

      <div class="card" onclick="flipCard()">
        <div>
          <div class="card-label" id="cardLabel">로딩 중</div>
          <div class="card-main" id="cardMain">vocab.csv 불러오는 중...</div>
          <div class="card-sub" id="cardSub"></div>
        </div>
      </div>

      <div class="controls">
        <button class="sub" onclick="prevWord()">이전 단어</button>
        <button onclick="speakWord()">발음 듣기</button>
        <button class="sub" onclick="nextWord()">다음 단어</button>
      </div>

      <div class="controls">
        <button class="sub" onclick="shuffleWords()">섞기</button>
        <button class="sub" onclick="resetFilters()">전체 보기</button>
      </div>

      <div class="status" id="statusText">카드를 누르면 뜻이 뒤집힌다.</div>
    </div>
  </div>

  <script>
    let vocabData = [];
    let filteredWords = [];
    let currentIndex = 0;
    let showingMeaning = false;

    const fixedBookOrder = ["T-map", "V-map", "절대수능-map"];

    const bookFilter = document.getElementById("bookFilter");
    const levelFilter = document.getElementById("levelFilter");
    const chapterFilter = document.getElementById("chapterFilter");

    const resultText = document.getElementById("resultText");
    const countText = document.getElementById("countText");
    const cardLabel = document.getElementById("cardLabel");
    const cardMain = document.getElementById("cardMain");
    const cardSub = document.getElementById("cardSub");
    const statusText = document.getElementById("statusText");

    function normalize(value) {
      return String(value || "").trim();
    }

    function unique(arr) {
      return [...new Set(arr.filter(Boolean))];
    }

    function sortChapters(arr) {
      return [...arr].sort((a, b) => {
        const na = Number(a), nb = Number(b);
        const aNum = !isNaN(na), bNum = !isNaN(nb);
        if (aNum && bNum) return na - nb;
        if (aNum) return -1;
        if (bNum) return 1;
        return String(a).localeCompare(String(b), "ko");
      });
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') i++;
          row.push(cell);
          if (row.some(v => String(v).trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        if (row.some(v => String(v).trim() !== "")) rows.push(row);
      }

      if (!rows.length) return [];

      const headers = rows[0].map(h => normalize(h));
      return rows.slice(1).map(cols => {
        const obj = {};
        headers.forEach((h, idx) => obj[h] = normalize(cols[idx] || ""));
        return obj;
      });
    }

    function fillBookOptions() {
      const booksInData = unique(vocabData.map(v => v["교재"]));
      const ordered = fixedBookOrder.filter(v => booksInData.includes(v));
      const extra = booksInData.filter(v => !fixedBookOrder.includes(v));
      const books = ["전체", ...ordered, ...extra];

      bookFilter.innerHTML = books.map(v => `<option value="${v}">${v}</option>`).join("");
    }

    function fillLevelOptions() {
      const selectedBook = bookFilter.value;
      let levels = vocabData;

      if (selectedBook !== "전체") {
        levels = levels.filter(v => normalize(v["교재"]) === selectedBook);
      }

      const list = ["전체", ...unique(levels.map(v => v["레벨"]))];
      levelFilter.innerHTML = list.map(v => `<option value="${v}">${v}</option>`).join("");
    }

    function fillChapterOptions() {
      const selectedBook = bookFilter.value;
      const selectedLevel = levelFilter.value;

      let chapters = vocabData;

      if (selectedBook !== "전체") {
        chapters = chapters.filter(v => normalize(v["교재"]) === selectedBook);
      }
      if (selectedLevel !== "전체") {
        chapters = chapters.filter(v => normalize(v["레벨"]) === selectedLevel);
      }

      const list = ["전체", ...sortChapters(unique(chapters.map(v => v["Chapter"])))];
      chapterFilter.innerHTML = list.map(v => {
        const text = v === "전체" ? "전체" : `Chapter ${v}`;
        return `<option value="${v}">${text}</option>`;
      }).join("");
    }

    function applyFilters(keepIndex = false) {
      const selectedBook = bookFilter.value;
      const selectedLevel = levelFilter.value;
      const selectedChapter = chapterFilter.value;

      filteredWords = vocabData.filter(v => {
        const bookOk = selectedBook === "전체" || normalize(v["교재"]) === selectedBook;
        const levelOk = selectedLevel === "전체" || normalize(v["레벨"]) === selectedLevel;
        const chapterOk = selectedChapter === "전체" || normalize(v["Chapter"]) === selectedChapter;
        return bookOk && levelOk && chapterOk;
      });

      resultText.textContent = `현재 단어 ${filteredWords.length}개`;

      if (!keepIndex) currentIndex = 0;
      showingMeaning = false;

      if (currentIndex >= filteredWords.length) currentIndex = 0;
      renderCard();
    }

    function renderCard() {
      if (!filteredWords.length) {
        cardLabel.textContent = "알림";
        cardMain.textContent = "조건에 맞는 단어가 없다";
        cardSub.textContent = "";
        countText.textContent = "0 / 0";
        return;
      }

      const item = filteredWords[currentIndex];
      const eng = item["영어"] || "";
      const kor = item["뜻"] || "";
      const info = `${item["교재"] || ""} · ${item["레벨"] || ""} · Chapter ${item["Chapter"] || ""}`;

      countText.textContent = `${currentIndex + 1} / ${filteredWords.length}`;

      if (showingMeaning) {
        cardLabel.textContent = "뜻";
        cardMain.textContent = kor;
        cardSub.textContent = info;
      } else {
        cardLabel.textContent = "영어";
        cardMain.textContent = eng;
        cardSub.textContent = info;
      }
    }

    function flipCard() {
      if (!filteredWords.length) return;
      showingMeaning = !showingMeaning;
      renderCard();
    }

    function nextWord() {
      if (!filteredWords.length) return;
      currentIndex = (currentIndex + 1) % filteredWords.length;
      showingMeaning = false;
      renderCard();
    }

    function prevWord() {
      if (!filteredWords.length) return;
      currentIndex = (currentIndex - 1 + filteredWords.length) % filteredWords.length;
      showingMeaning = false;
      renderCard();
    }

    function shuffleWords() {
      if (!filteredWords.length) return;
      for (let i = filteredWords.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [filteredWords[i], filteredWords[j]] = [filteredWords[j], filteredWords[i]];
      }
      currentIndex = 0;
      showingMeaning = false;
      renderCard();
    }

    function resetFilters() {
      bookFilter.value = "전체";
      fillLevelOptions();
      levelFilter.value = "전체";
      fillChapterOptions();
      chapterFilter.value = "전체";
      applyFilters();
    }

    function speakWord() {
      if (!filteredWords.length) return;
      const text = filteredWords[currentIndex]["영어"] || "";
      if (!text) return;

      if (!("speechSynthesis" in window)) {
        alert("이 기기에서는 음성 기능을 지원하지 않는다.");
        return;
      }

      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      utter.rate = 0.95;
      window.speechSynthesis.speak(utter);
    }

    bookFilter.addEventListener("change", () => {
      fillLevelOptions();
      levelFilter.value = "전체";
      fillChapterOptions();
      chapterFilter.value = "전체";
      applyFilters();
    });

    levelFilter.addEventListener("change", () => {
      fillChapterOptions();
      chapterFilter.value = "전체";
      applyFilters();
    });

    chapterFilter.addEventListener("change", () => {
      applyFilters();
    });

    async function loadCSV() {
      try {
        const res = await fetch("./vocab.csv?v=" + Date.now());
        if (!res.ok) throw new Error("CSV 로드 실패");

        const text = await res.text();
        vocabData = parseCSV(text).filter(v =>
          normalize(v["교재"]) &&
          normalize(v["레벨"]) &&
          normalize(v["Chapter"]) &&
          normalize(v["영어"]) &&
          normalize(v["뜻"])
        );

        if (!vocabData.length) {
          cardLabel.textContent = "오류";
          cardMain.textContent = "데이터가 없다";
          cardSub.textContent = "vocab.csv 헤더나 내용을 확인해라";
          statusText.textContent = "헤더는 교재,레벨,구간,Chapter,영어,뜻 이어야 한다.";
          return;
        }

        fillBookOptions();
        fillLevelOptions();
        fillChapterOptions();
        applyFilters();

        statusText.textContent = `불러오기 완료. 전체 ${vocabData.length}개 단어.`;
      } catch (e) {
        console.error(e);
        cardLabel.textContent = "오류";
        cardMain.textContent = "vocab.csv를 못 읽었다";
        cardSub.textContent = "파일명이나 업로드 위치를 확인해라";
        statusText.textContent = "index.html과 vocab.csv가 같은 폴더에 있어야 한다.";
      }
    }

    loadCSV();
  </script>
</body>
</html>
