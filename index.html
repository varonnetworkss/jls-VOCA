<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand-row">
      <div class="brand-left">
        <img src="/jls-VOCA/icons/192.png" alt="JLS 로고" class="brand-logo">
        <div class="title-wrap">
          <div class="title-badge">✦</div>
          <div class="title-text">
            <div class="title-main">Master the Words</div>
            <div class="title-sub">JLS Word Trainer</div>
          </div>
        </div>
      </div>
      <div class="top-icon">🔍</div>
    </div>
    <div class="path" id="path">로딩 중...</div>
    <div class="controls" id="controls"></div>
  </div>
  <div id="app" class="loading">단어 데이터를 불러오는 중...</div>
</div>

<script>
const BOOK_FILES = {
  "T-map": "./vocab.csv",
  "V-map": "./vmap.csv",
  "절대수능-map": "./suneung.csv"
  "수능공습": "./gongseup.csv"
};

const FORCE_POS = {
  "such as": "preposition",
  "thanks to": "preposition",
  "according to": "preposition",
  "because of": "preposition",
  "instead of": "preposition",
  "as for": "preposition",
  "as to": "preposition",
  "first": "adverb",
  "excited": "adjective",
  "biased": "adjective",
  "mention": "verb",
  "setting": "noun"
};

const wordMetaCache = {};

let rawData = [];

let state = {
  book: null,
  level: null,
  section: null,
  chapter: null,
  hideWord: false,
  hideMeaning: false,
  mode: "browse"
};

let testState = {
  questions: [],
  currentIndex: 0,
  score: 0,
  selected: null,
  answered: false
};

const app = document.getElementById("app");
const controls = document.getElementById("controls");
const pathEl = document.getElementById("path");

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i + 1];

    if(char === '"'){
      if(inQuotes && next === '"'){
        cell += '"';
        i++;
      }else{
        inQuotes = !inQuotes;
      }
    }else if((char === ',' || char === '\t') && !inQuotes){
      row.push(cell);
      cell = "";
    }else if((char === '\n' || char === '\r') && !inQuotes){
      if(char === '\r' && next === '\n') i++;
      row.push(cell);
      if(row.some(v => String(v).trim() !== "")){
        rows.push(row);
      }
      row = [];
      cell = "";
    }else{
      cell += char;
    }
  }

  if(cell !== "" || row.length){
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function normalizeHeader(v){
  return String(v || "").replace(/\uFEFF/g, "").trim();
}

function escapeHtml(text){
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function getUnique(arr, key){
  return [...new Set(arr.map(x => String(x[key] || "").trim()).filter(Boolean))];
}

function shuffle(arr){
  const copy = [...arr];
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function formatPos(pos){
  const map = {
    noun: "명사",
    verb: "동사",
    adjective: "형용사",
    adverb: "부사",
    pronoun: "대명사",
    preposition: "전치사",
    conjunction: "접속사",
    interjection: "감탄사",
    phrase: "구"
  };
  return map[pos] || pos || "품사 없음";
}

function guessPosFromKor(korText){
  const text = String(korText || "").trim();
  if(!text) return "";

  if(/하다$|되다$|시키다$|받다$|주다$|가다$|오다$|보다$|말하다$|쓰다$|만들다$|보여주다$|알리다$|언급하다$|설명하다$|제안하다$|포함하다$|사용하다$|유발하다$|제공하다$|개선하다$|변화하다$|줄이다$|늘리다$|선택하다$|정리하다$|추가하다$|삭제하다$/.test(text)){
    return "verb";
  }

  if(/한$|적인$|스러운$|로운$|같은$|있는$|없는$|중요한$|가능한$|어려운$|쉬운$|편향된$|치우친$|특정한$|적절한$|필요한$|유명한$|간단한$|신이 난$|신이난$|흥분한$|기쁜$/.test(text)){
    return "adjective";
  }

  if(/게$|히$|껏$|먼저$|이미$|아직$|다시$|곧$|빨리$/.test(text)){
    return "adverb";
  }

  return "noun";
}

function pickByPriority(list, priorities){
  for(const p of priorities){
    const found = list.find(x => x.pos === p);
    if(found) return found;
  }
  return list[0];
}

async function getWordMeta(word, meaningKor = ""){
  const key = String(word || "").trim().toLowerCase();
  const kor = String(meaningKor || "").trim();
  const cacheKey = `${key}__${kor}`;

  if(!key){
    return { pos:"품사 없음", example:"예문 없음" };
  }

  if(wordMetaCache[cacheKey]) return wordMetaCache[cacheKey];

  if(FORCE_POS[key]){
    const forced = {
      pos: FORCE_POS[key],
      example: "예문 없음"
    };
    wordMetaCache[cacheKey] = forced;
    return forced;
  }

  try{
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(key)}`);
    if(!res.ok) throw new Error("not found");

    const data = await res.json();
    const candidates = [];

    if(Array.isArray(data)){
      for(const entry of data){
        if(!Array.isArray(entry.meanings)) continue;

        for(const meaning of entry.meanings){
          const part = meaning.partOfSpeech || "";
          let example = "";

          if(Array.isArray(meaning.definitions)){
            const found = meaning.definitions.find(d => d && d.example);
            if(found?.example) example = found.example;
          }

          candidates.push({
            pos: part,
            example: example || "예문 없음"
          });
        }
      }
    }

    if(!candidates.length){
      const result = { pos:"품사 없음", example:"예문 없음" };
      wordMetaCache[cacheKey] = result;
      return result;
    }

    let picked = null;

    const guessedPos = guessPosFromKor(kor);
    if(guessedPos){
      picked = pickByPriority(candidates, [guessedPos, "noun", "verb", "adjective", "adverb"]);
    }

    if(!picked){
      if(key.endsWith("ed")){
        picked = pickByPriority(candidates, ["adjective", "verb", "noun"]);
      }else if(key.endsWith("ing")){
        picked = pickByPriority(candidates, ["noun", "adjective", "verb"]);
      }else{
        picked = candidates[0];
      }
    }

    if(/환경|상황|장소|배경|조건|설정|무대/.test(kor)){
      picked = pickByPriority(candidates, ["noun", "adjective", "verb"]);
    }

    if(/편향된|치우친|기울어진|스러운|로운|신이 난|신이난|흥분한/.test(kor)){
      picked = pickByPriority(candidates, ["adjective", "verb", "noun"]);
    }

    if(/언급하다|말하다|설명하다|제안하다|포함하다|사용하다|개선하다|제공하다|표현하다|보여주다/.test(kor)){
      picked = pickByPriority(candidates, ["verb", "noun", "adjective"]);
    }

    if(/먼저|이미|아직|다시|곧|빨리/.test(kor)){
      picked = pickByPriority(candidates, ["adverb", "adjective", "noun", "verb"]);
    }

    const result = {
      pos: picked?.pos || "품사 없음",
      example: picked?.example || "예문 없음"
    };

    wordMetaCache[cacheKey] = result;
    return result;
  }catch(e){
    const result = {
      pos: guessPosFromKor(kor) || "품사 없음",
      example: "예문 없음"
    };
    wordMetaCache[cacheKey] = result;
    return result;
  }
}

function speakWord(word){
  if (!("speechSynthesis" in window)) {
    alert("이 기기에서는 음성 재생을 지원하지 않습니다.");
    return;
  }

  const synth = window.speechSynthesis;
  synth.cancel();

  const speak = () => {
    const u = new SpeechSynthesisUtterance(word);
    u.lang = "en-US";
    u.rate = 0.9;
    u.pitch = 1;
    u.volume = 1;

    const voices = synth.getVoices();
    const voice =
      voices.find(v => v.lang === "en-US") ||
      voices.find(v => v.lang.startsWith("en")) ||
      voices[0];

    if (voice) u.voice = voice;
    synth.speak(u);
  };

  const voices = synth.getVoices();
  if (voices.length === 0) {
    synth.onvoiceschanged = () => {
      speak();
      synth.onvoiceschanged = null;
    };
    setTimeout(speak, 300);
  } else {
    speak();
  }
}

function renderControls(){
  let html = "";

  if(state.book) html += `<button class="btn" data-action="home">처음으로</button>`;
  if(state.book && !state.level) html += `<button class="btn" data-action="back-books">← 교재</button>`;
  if(state.level && !state.section) html += `<button class="btn" data-action="back-levels">← 레벨</button>`;
  if(state.section && !state.chapter) html += `<button class="btn" data-action="back-sections">← 구간</button>`;

  if(state.chapter && state.mode === "browse"){
    html += `<button class="btn" data-action="back-chapters">← Chapter</button>`;
    html += `<button class="btn" data-action="toggle-meaning">${state.hideMeaning ? "뜻 보이기" : "뜻 숨기기"}</button>`;
    html += `<button class="btn" data-action="toggle-word">${state.hideWord ? "영어 보이기" : "영어 숨기기"}</button>`;
    html += `<button class="btn" data-action="start-test">테스트 시작</button>`;
  }

  if(state.chapter && state.mode === "test"){
    html += `<button class="btn" data-action="exit-test">단어장으로 돌아가기</button>`;
  }

  if(state.chapter && state.mode === "result"){
    html += `<button class="btn" data-action="restart-test">다시 테스트</button>`;
    html += `<button class="btn" data-action="exit-test">단어장으로 돌아가기</button>`;
  }

  controls.innerHTML = html;
}

function renderPath(){
  const parts = ["홈"];
  if(state.book) parts.push(state.book);
  if(state.level) parts.push(state.level);
  if(state.section) parts.push(state.section);
  if(state.chapter) parts.push(`Chapter ${state.chapter}`);
  if(state.mode === "test") parts.push("테스트");
  if(state.mode === "result") parts.push("결과");
  pathEl.textContent = parts.join(" > ");
}

function renderBooks(){
  const books = Object.keys(BOOK_FILES);

  app.innerHTML = `
    <div class="grid">
      ${books.map(book => `
        <div class="card" data-type="book" data-value="${escapeHtml(book)}">${escapeHtml(book)}</div>
      `).join("")}
    </div>
  `;
}

function renderLevels(){
  const rows = rawData.filter(x => x["교재"] === state.book || !x["교재"]);
  const levels = getUnique(rows, "레벨");

  if(!levels.length){
    app.innerHTML = `<div class="empty">해당 교재의 레벨 데이터가 없다.</div>`;
    return;
  }

  app.innerHTML = `
    <div class="grid">
      ${levels.map(level => `
        <div class="card" data-type="level" data-value="${escapeHtml(level)}">${escapeHtml(level)}</div>
      `).join("")}
    </div>
  `;
}

function renderSections(){
  const rows = rawData.filter(x =>
    (x["교재"] === state.book || !x["교재"]) &&
    x["레벨"] === state.level
  );
  const sections = getUnique(rows, "구간");

  if(!sections.length){
    app.innerHTML = `<div class="empty">해당 레벨의 구간 데이터가 없다.</div>`;
    return;
  }

  app.innerHTML = `
    <div class="grid">
      ${sections.map(section => `
        <div class="card" data-type="section" data-value="${escapeHtml(section)}">${escapeHtml(section)}</div>
      `).join("")}
    </div>
  `;
}

function renderChapters(){
  const rows = rawData.filter(x =>
    (x["교재"] === state.book || !x["교재"]) &&
    x["레벨"] === state.level &&
    x["구간"] === state.section
  );

  const chapters = getUnique(rows, "Chapter").sort((a, b) => Number(a) - Number(b));

  if(!chapters.length){
    app.innerHTML = `<div class="empty">해당 구간의 Chapter 데이터가 없다.</div>`;
    return;
  }

  app.innerHTML = `
    <div class="grid">
      ${chapters.map(ch => `
        <div class="card" data-type="chapter" data-value="${escapeHtml(ch)}">Chapter ${escapeHtml(ch)}</div>
      `).join("")}
    </div>
  `;
}

function getCurrentChapterRows(){
  return rawData.filter(x =>
    (x["교재"] === state.book || !x["교재"]) &&
    x["레벨"] === state.level &&
    x["구간"] === state.section &&
    x["Chapter"] === state.chapter
  );
}

function renderWords(){
  const rows = getCurrentChapterRows();

  if(!rows.length){
    app.innerHTML = `<div class="empty">해당 Chapter의 단어 데이터가 없다.</div>`;
    return;
  }

  app.innerHTML = `
    <div class="word-grid">
      ${rows.map((row, i) => `
        <div class="word-card">
          <div class="word-left">
            <div class="word ${state.hideWord ? "hidden-word" : ""}">${i + 1}. ${escapeHtml(row["영어"])}</div>
            <div class="meaning ${state.hideMeaning ? "hidden-meaning" : ""}">${escapeHtml(row["뜻"])}</div>
            <div class="meta-wrap">
              <div class="meta-loading" id="meta-${i}">품사와 예문 불러오는 중...</div>
            </div>
          </div>
          <button class="speak-btn" data-type="speak" data-value="${escapeHtml(row["영어"])}">🔊</button>
        </div>
      `).join("")}
    </div>
  `;

  rows.forEach(async (row, i) => {
    const metaEl = document.getElementById(`meta-${i}`);
    if(!metaEl) return;

    const meta = await getWordMeta(row["영어"], row["뜻"]);

    metaEl.innerHTML = `
      <div class="pos">품사: ${escapeHtml(formatPos(meta.pos))}</div>
      <div class="example">예문: ${escapeHtml(meta.example)}</div>
    `;
  });
}

function buildTestQuestions(rows){
  const usable = rows.filter(r => r["영어"] && r["뜻"]);
  const shuffled = shuffle(usable);

  return shuffled.map(row => {
    const correct = row["뜻"];
    const wrongPool = shuffle(
      usable.map(x => x["뜻"]).filter(v => v && v !== correct)
    ).slice(0, 3);

    const choices = shuffle([correct, ...wrongPool]);

    return {
      word: row["영어"],
      correct,
      choices
    };
  });
}

function startTest(){
  const rows = getCurrentChapterRows();

  if(rows.length < 4){
    alert("테스트를 하려면 해당 Chapter에 단어가 최소 4개 있어야 한다.");
    return;
  }

  testState = {
    questions: buildTestQuestions(rows),
    currentIndex: 0,
    score: 0,
    selected: null,
    answered: false
  };

  state.mode = "test";
  render();
}

function renderTest(){
  const q = testState.questions[testState.currentIndex];

  if(!q){
    state.mode = "result";
    render();
    return;
  }

  app.innerHTML = `
    <div class="test-wrap">
      <div class="test-top">
        <div class="test-progress">${testState.currentIndex + 1} / ${testState.questions.length}</div>
        <div class="test-progress">점수 ${testState.score}</div>
      </div>

      <div class="question-box">
        <div class="question-label">다음 영어의 뜻은?</div>
        <div class="question-word">${escapeHtml(q.word)}</div>
      </div>

      <div class="choice-grid">
        ${q.choices.map(choice => {
          let cls = "choice-btn";

          if(testState.answered){
            if(choice === q.correct) cls += " correct";
            else if(choice === testState.selected && choice !== q.correct) cls += " wrong";
          }

          return `
            <button
              class="${cls}"
              data-type="choice"
              data-value="${escapeHtml(choice)}"
              ${testState.answered ? "disabled" : ""}
            >
              ${escapeHtml(choice)}
            </button>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

function handleChoice(choice){
  if(testState.answered) return;

  const q = testState.questions[testState.currentIndex];
  testState.selected = choice;
  testState.answered = true;

  if(choice === q.correct){
    testState.score += 1;
  }

  renderTest();

  setTimeout(() => {
    testState.currentIndex += 1;
    testState.selected = null;
    testState.answered = false;

    if(testState.currentIndex >= testState.questions.length){
      state.mode = "result";
      render();
    }else{
      renderTest();
      renderControls();
      renderPath();
    }
  }, 800);
}

function renderResult(){
  const total = testState.questions.length;
  const score = testState.score;
  const percent = total ? Math.round((score / total) * 100) : 0;

  app.innerHTML = `
    <div class="test-result">
      <div class="result-score">${score} / ${total}</div>
      <div class="result-sub">정답률 ${percent}%</div>
      <div class="result-buttons">
        <button class="btn" data-action="restart-test">다시 테스트</button>
        <button class="btn" data-action="exit-test">단어장으로 돌아가기</button>
      </div>
    </div>
  `;
}

function render(){
  renderControls();
  renderPath();

  if(!state.book) return renderBooks();
  if(!state.level) return renderLevels();
  if(!state.section) return renderSections();
  if(!state.chapter) return renderChapters();

  if(state.mode === "browse") return renderWords();
  if(state.mode === "test") return renderTest();
  if(state.mode === "result") return renderResult();
}

function resetLowerState(){
  state.level = null;
  state.section = null;
  state.chapter = null;
  state.hideWord = false;
  state.hideMeaning = false;
  state.mode = "browse";
  rawData = [];
}

function goHome(){
  state = {
    book: null,
    level: null,
    section: null,
    chapter: null,
    hideWord: false,
    hideMeaning: false,
    mode: "browse"
  };
  rawData = [];
  render();
}

async function loadBookData(bookName){
  const file = BOOK_FILES[bookName];

  if(!file){
    app.innerHTML = `<div class="empty">해당 교재 파일 설정이 없다.</div>`;
    return false;
  }

  app.innerHTML = `<div class="loading">단어 데이터를 불러오는 중...</div>`;

  try{
    const res = await fetch(file + "?ts=" + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);

    if(rows.length < 2){
      app.innerHTML = `<div class="empty">${bookName} 파일 데이터가 비어 있다.</div>`;
      return false;
    }

    const headers = rows[0].map(normalizeHeader);
    const required = ["교재", "레벨", "구간", "Chapter", "영어", "뜻"];
    const missing = required.filter(x => !headers.includes(x));

    if(missing.length){
      app.innerHTML = `<div class="empty">${bookName} CSV 헤더가 맞지 않다.<br>누락: ${missing.join(", ")}</div>`;
      return false;
    }

    rawData = rows.slice(1)
      .filter(r => r.some(v => String(v).trim() !== ""))
      .map(r => {
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = String(r[i] || "").trim();
        });
        return obj;
      });

    return true;
  }catch(e){
    app.innerHTML = `<div class="empty">데이터를 불러오지 못했다.<br>${bookName} 파일명을 확인해라.</div>`;
    return false;
  }
}

async function loadDataToState(type, value){
  if(type === "book"){
    state.book = value;
    resetLowerState();

    const ok = await loadBookData(value);
    if(ok) render();
    return;
  }

  if(type === "level"){
    state.level = value;
    state.section = null;
    state.chapter = null;
    state.hideWord = false;
    state.hideMeaning = false;
    state.mode = "browse";
    render();
    return;
  }

  if(type === "section"){
    state.section = value;
    state.chapter = null;
    state.hideWord = false;
    state.hideMeaning = false;
    state.mode = "browse";
    render();
    return;
  }

  if(type === "chapter"){
    state.chapter = value;
    state.hideWord = false;
    state.hideMeaning = false;
    state.mode = "browse";
    render();
  }
}

controls.addEventListener("click", function(e){
  const btn = e.target.closest("[data-action]");
  if(!btn) return;

  const action = btn.dataset.action;

  if(action === "home"){ goHome(); return; }
  if(action === "back-books"){ goHome(); return; }

  if(action === "back-levels"){
    state.level = null;
    state.section = null;
    state.chapter = null;
    state.hideWord = false;
    state.hideMeaning = false;
    state.mode = "browse";
    render();
    return;
  }

  if(action === "back-sections"){
    state.section = null;
    state.chapter = null;
    state.hideWord = false;
    state.hideMeaning = false;
    state.mode = "browse";
    render();
    return;
  }

  if(action === "back-chapters"){
    state.chapter = null;
    state.hideWord = false;
    state.hideMeaning = false;
    state.mode = "browse";
    render();
    return;
  }

  if(action === "toggle-meaning"){
    state.hideMeaning = !state.hideMeaning;
    renderControls();
    renderWords();
    return;
  }

  if(action === "toggle-word"){
    state.hideWord = !state.hideWord;
    renderControls();
    renderWords();
    return;
  }

  if(action === "start-test"){ startTest(); return; }
  if(action === "exit-test"){ state.mode = "browse"; render(); return; }
  if(action === "restart-test"){ startTest(); }
});

app.addEventListener("click", async function(e){
  const target = e.target.closest("[data-type]");
  if(!target) return;

  const type = target.dataset.type;
  const value = target.dataset.value;

  if(type === "speak"){ speakWord(value); return; }
  if(type === "choice"){ handleChoice(value); return; }

  await loadDataToState(type, value);
});

function init(){
  window.speechSynthesis?.getVoices();
  render();
}

init();
</script>
