<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>서수원 JLS 단어장</title>
<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  color: #111827;
}

body {
  min-height: 100vh;
}

.wrap {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(244, 246, 251, 0.96);
  backdrop-filter: blur(10px);
  padding: 16px 0 14px;
}

h1 {
  margin: 0 0 8px;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.subtxt {
  margin: 0 0 16px;
  font-size: 14px;
  color: #6b7280;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.controls select,
.controls input {
  width: 100%;
  height: 46px;
  border: 1px solid #dbe2ea;
  border-radius: 14px;
  padding: 0 14px;
  font-size: 14px;
  background: #fff;
  outline: none;
}

.controls select:focus,
.controls input:focus,
.test-answer:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}

.button-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

button {
  border: 0;
  border-radius: 999px;
  padding: 11px 16px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  transform: translateY(-1px);
}

.btn-primary {
  background: #2563eb;
  color: #fff;
}

.btn-secondary {
  background: #e8efff;
  color: #1d4ed8;
}

.btn-gray {
  background: #eef2f7;
  color: #374151;
}

.stats {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.stat-card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  padding: 14px 16px;
  min-width: 120px;
  box-shadow: 0 6px 18px rgba(17, 24, 39, 0.04);
}

.stat-label {
  font-size: 12px;
  color: #6b7280;
  margin-bottom: 6px;
}

.stat-value {
  font-size: 20px;
  font-weight: 800;
}

.section-title {
  font-size: 18px;
  font-weight: 800;
  margin: 24px 0 12px;
}

.list {
  display: grid;
  gap: 12px;
}

.word-card {
  background: #fff;
  border: 1px solid #e6ebf2;
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 8px 24px rgba(17, 24, 39, 0.05);
}

.word-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.word-en {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 6px;
}

.word-ko {
  font-size: 15px;
  color: #374151;
  line-height: 1.5;
}

.badge {
  display: inline-flex;
  align-items: center;
  height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  background: #eef2ff;
  color: #4338ca;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}

.word-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.meta-chip {
  padding: 7px 10px;
  border-radius: 999px;
  background: #f3f4f6;
  font-size: 12px;
  color: #4b5563;
}

.empty {
  background: #fff;
  border: 1px dashed #cbd5e1;
  border-radius: 20px;
  padding: 40px 20px;
  text-align: center;
  color: #6b7280;
}

.hidden {
  display: none !important;
}

.test-wrap {
  background: #fff;
  border-radius: 24px;
  padding: 24px 18px;
  box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
  border: 1px solid #e5e7eb;
}

.test-progress {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 10px;
}

.test-question {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 18px;
  line-height: 1.3;
}

.test-answer {
  width: 100%;
  height: 48px;
  border: 1px solid #dbe2ea;
  border-radius: 14px;
  padding: 0 14px;
  font-size: 15px;
  margin-bottom: 14px;
  outline: none;
}

.test-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.result-box {
  margin-top: 16px;
  border-radius: 16px;
  padding: 14px;
  font-size: 14px;
  font-weight: 700;
}

.result-correct {
  background: #ecfdf5;
  color: #047857;
}

.result-wrong {
  background: #fef2f2;
  color: #b91c1c;
}

.score-box {
  margin-top: 18px;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 24px rgba(17, 24, 39, 0.05);
}

.score-big {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
}

.score-sub {
  color: #6b7280;
  font-size: 14px;
}

@media (max-width: 640px) {
  .wrap {
    padding: 16px 12px 32px;
  }

  h1 {
    font-size: 24px;
  }

  .controls {
    grid-template-columns: 1fr;
  }

  .word-en {
    font-size: 20px;
  }

  .test-question {
    font-size: 24px;
  }

  .test-actions button,
  .button-row button {
    width: 100%;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>서수원 JLS 단어장</h1>
    <p class="subtxt">교재별 단어 학습 · 검색 · 테스트</p>

    <div class="controls">
      <select id="bookSelect">
        <option value="">교재 전체</option>
      </select>

      <select id="levelSelect">
        <option value="">레벨 전체</option>
      </select>

      <select id="chapterSelect">
        <option value="">챕터 전체</option>
      </select>

      <input type="text" id="searchInput" placeholder="영어 / 뜻 검색" />
    </div>

    <div class="button-row">
      <button class="btn-primary" id="showWordsBtn">단어 보기</button>
      <button class="btn-secondary" id="startTestBtn">테스트 시작</button>
      <button class="btn-gray" id="shuffleBtn">랜덤 섞기</button>
    </div>
  </div>

  <div class="stats" id="statsArea">
    <div class="stat-card">
      <div class="stat-label">전체 단어</div>
      <div class="stat-value" id="totalCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">현재 결과</div>
      <div class="stat-value" id="filteredCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">현재 챕터</div>
      <div class="stat-value" id="currentChapterText">-</div>
    </div>
  </div>

  <div id="wordSection">
    <div class="section-title">단어 목록</div>
    <div class="list" id="wordList"></div>
  </div>

  <div id="testSection" class="hidden">
    <div class="section-title">단어 테스트</div>

    <div class="test-wrap" id="testWrap">
      <div class="test-progress" id="testProgress">0 / 0 문제</div>
      <div class="test-question" id="testQuestion">단어</div>
      <input type="text" class="test-answer" id="testAnswer" placeholder="뜻을 입력하세요" />
      <div class="test-actions">
        <button class="btn-primary" id="checkAnswerBtn">정답 확인</button>
        <button class="btn-gray" id="nextQuestionBtn">다음 문제</button>
        <button class="btn-secondary" id="backToWordsBtn">목록으로</button>
      </div>
      <div id="resultBox" class="hidden"></div>
    </div>

    <div class="score-box hidden" id="scoreBox">
      <div class="score-big" id="scoreText">0점</div>
      <div class="score-sub" id="scoreSubText">테스트 완료</div>
    </div>
  </div>
</div>

<script>
/*
  ============================
  1. CSV 파일명 수정
  ============================
*/
const CSV_URL = "words.csv";

/*
  ============================
  2. CSV 헤더명 맞추기
  네 파일 헤더에 맞게 여기만 바꾸면 됨
  ============================
*/
const KEY_MAP = {
  book: "교재",
  level: "레벨",
  chapterCode: "구간",
  chapterName: "Chapter",
  english: "영어",
  meaning: "뜻",
  id: "id"
};

let allWords = [];
let filteredWords = [];

let currentTestWords = [];
let currentIndex = 0;
let correctCount = 0;
let answeredCurrent = false;

const bookSelect = document.getElementById("bookSelect");
const levelSelect = document.getElementById("levelSelect");
const chapterSelect = document.getElementById("chapterSelect");
const searchInput = document.getElementById("searchInput");

const wordList = document.getElementById("wordList");
const totalCount = document.getElementById("totalCount");
const filteredCount = document.getElementById("filteredCount");
const currentChapterText = document.getElementById("currentChapterText");

const showWordsBtn = document.getElementById("showWordsBtn");
const startTestBtn = document.getElementById("startTestBtn");
const shuffleBtn = document.getElementById("shuffleBtn");

const wordSection = document.getElementById("wordSection");
const testSection = document.getElementById("testSection");

const testProgress = document.getElementById("testProgress");
const testQuestion = document.getElementById("testQuestion");
const testAnswer = document.getElementById("testAnswer");
const resultBox = document.getElementById("resultBox");
const checkAnswerBtn = document.getElementById("checkAnswerBtn");
const nextQuestionBtn = document.getElementById("nextQuestionBtn");
const backToWordsBtn = document.getElementById("backToWordsBtn");
const scoreBox = document.getElementById("scoreBox");
const scoreText = document.getElementById("scoreText");
const scoreSubText = document.getElementById("scoreSubText");

async function loadCSV() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const rows = parseCSV(text);

    allWords = rows.map((row, idx) => ({
      id: row[KEY_MAP.id] || idx + 1,
      book: row[KEY_MAP.book] || "",
      level: row[KEY_MAP.level] || "",
      chapterCode: row[KEY_MAP.chapterCode] || "",
      chapterName: row[KEY_MAP.chapterName] || "",
      english: row[KEY_MAP.english] || "",
      meaning: row[KEY_MAP.meaning] || ""
    })).filter(item => item.english && item.meaning);

    totalCount.textContent = allWords.length;
    fillSelectOptions();
    applyFilters();
  } catch (err) {
    wordList.innerHTML = `<div class="empty">CSV 불러오기 실패. 파일명이나 경로 확인해봐.</div>`;
    console.error(err);
  }
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];

  const headers = splitCSVLine(lines[0]);

  return lines.slice(1).map(line => {
    const values = splitCSVLine(line);
    const row = {};
    headers.forEach((h, i) => {
      row[h] = values[i] ?? "";
    });
    return row;
  });
}

function splitCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    const next = line[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === "," && !inQuotes) {
      result.push(current.trim());
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current.trim());
  return result;
}

function fillSelectOptions() {
  fillSelect(bookSelect, getUnique(allWords.map(v => v.book)), "교재 전체");
  fillSelect(levelSelect, getUnique(allWords.map(v => v.level)), "레벨 전체");
  updateChapterOptions();
}

function updateChapterOptions() {
  let source = [...allWords];

  if (bookSelect.value) {
    source = source.filter(v => v.book === bookSelect.value);
  }

  if (levelSelect.value) {
    source = source.filter(v => v.level === levelSelect.value);
  }

  const chapterValues = getUnique(source.map(v => v.chapterCode || v.chapterName).filter(Boolean));
  const currentValue = chapterSelect.value;

  fillSelect(chapterSelect, chapterValues, "챕터 전체");

  if (chapterValues.includes(currentValue)) {
    chapterSelect.value = currentValue;
  }
}

function fillSelect(selectEl, values, defaultLabel) {
  selectEl.innerHTML = `<option value="">${defaultLabel}</option>`;
  values.forEach(v => {
    const option = document.createElement("option");
    option.value = v;
    option.textContent = v;
    selectEl.appendChild(option);
  });
}

function getUnique(arr) {
  return [...new Set(arr.filter(Boolean))];
}

function applyFilters() {
  const book = bookSelect.value.trim().toLowerCase();
  const level = levelSelect.value.trim().toLowerCase();
  const chapter = chapterSelect.value.trim().toLowerCase();
  const keyword = searchInput.value.trim().toLowerCase();

  filteredWords = allWords.filter(item => {
    const chapterValue = (item.chapterCode || item.chapterName || "").toLowerCase();

    const matchBook = !book || item.book.toLowerCase() === book;
    const matchLevel = !level || item.level.toLowerCase() === level;
    const matchChapter = !chapter || chapterValue === chapter;
    const matchKeyword =
      !keyword ||
      item.english.toLowerCase().includes(keyword) ||
      item.meaning.toLowerCase().includes(keyword);

    return matchBook && matchLevel && matchChapter && matchKeyword;
  });

  renderWords(filteredWords);
  updateStats();
}

function updateStats() {
  filteredCount.textContent = filteredWords.length;

  if (chapterSelect.value) {
    currentChapterText.textContent = chapterSelect.value;
  } else {
    currentChapterText.textContent = "-";
  }
}

function renderWords(words) {
  if (!words.length) {
    wordList.innerHTML = `<div class="empty">조건에 맞는 단어가 없다.</div>`;
    return;
  }

  wordList.innerHTML = words.map(item => `
    <div class="word-card">
      <div class="word-top">
        <div>
          <div class="word-en">${escapeHtml(item.english)}</div>
          <div class="word-ko">${escapeHtml(item.meaning)}</div>
        </div>
        <div class="badge">${escapeHtml(item.chapterCode || item.chapterName || "-")}</div>
      </div>

      <div class="word-meta">
        <div class="meta-chip">${escapeHtml(item.book || "-")}</div>
        <div class="meta-chip">${escapeHtml(item.level || "-")}</div>
        <div class="meta-chip">${escapeHtml(item.chapterName || item.chapterCode || "-")}</div>
      </div>
    </div>
  `).join("");
}

function startTest() {
  if (!filteredWords.length) {
    alert("테스트할 단어가 없다.");
    return;
  }

  currentTestWords = [...filteredWords];
  currentIndex = 0;
  correctCount = 0;
  answeredCurrent = false;

  wordSection.classList.add("hidden");
  testSection.classList.remove("hidden");
  scoreBox.classList.add("hidden");

  renderQuestion();
}

function renderQuestion() {
  if (currentIndex >= currentTestWords.length) {
    finishTest();
    return;
  }

  const current = currentTestWords[currentIndex];

  testProgress.textContent = `${currentIndex + 1} / ${currentTestWords.length} 문제`;
  testQuestion.textContent = current.english;
  testAnswer.value = "";
  testAnswer.focus();
  answeredCurrent = false;

  resultBox.className = "hidden";
  resultBox.innerHTML = "";
}

function checkAnswer() {
  if (currentIndex >= currentTestWords.length) return;
  if (answeredCurrent) return;

  const current = currentTestWords[currentIndex];
  const userAnswer = normalizeText(testAnswer.value);
  const correctAnswer = normalizeText(current.meaning);

  answeredCurrent = true;

  if (userAnswer && correctAnswer.includes(userAnswer)) {
    correctCount++;
    resultBox.className = "result-box result-correct";
    resultBox.textContent = `정답! ${current.meaning}`;
  } else {
    resultBox.className = "result-box result-wrong";
    resultBox.textContent = `오답! 정답: ${current.meaning}`;
  }
}

function nextQuestion() {
  if (currentIndex >= currentTestWords.length) return;

  if (!answeredCurrent) {
    checkAnswer();
    return;
  }

  currentIndex++;
  renderQuestion();
}

function finishTest() {
  const score = Math.round((correctCount / currentTestWords.length) * 100);

  testProgress.textContent = `테스트 완료`;
  testQuestion.textContent = "끝!";
  testAnswer.value = "";
  resultBox.className = "hidden";

  scoreBox.classList.remove("hidden");
  scoreText.textContent = `${score}점`;
  scoreSubText.textContent = `${currentTestWords.length}문제 중 ${correctCount}개 정답`;
}

function showWordSection() {
  testSection.classList.add("hidden");
  wordSection.classList.remove("hidden");
}

function shuffleFilteredWords() {
  filteredWords = [...filteredWords].sort(() => Math.random() - 0.5);
  renderWords(filteredWords);
}

function normalizeText(text) {
  return String(text || "")
    .replace(/\s+/g, "")
    .trim()
    .toLowerCase();
}

function escapeHtml(str) {
  return String(str ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

bookSelect.addEventListener("change", () => {
  updateChapterOptions();
  applyFilters();
});

levelSelect.addEventListener("change", () => {
  updateChapterOptions();
  applyFilters();
});

chapterSelect.addEventListener("change", applyFilters);
searchInput.addEventListener("input", applyFilters);

showWordsBtn.addEventListener("click", showWordSection);
startTestBtn.addEventListener("click", startTest);
shuffleBtn.addEventListener("click", shuffleFilteredWords);
checkAnswerBtn.addEventListener("click", checkAnswer);
nextQuestionBtn.addEventListener("click", nextQuestion);
backToWordsBtn.addEventListener("click", showWordSection);

testAnswer.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    if (!answeredCurrent) {
      checkAnswer();
    } else {
      nextQuestion();
    }
  }
});

loadCSV();
</script>
</body>
</html>
