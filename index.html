<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서수원 JLS 단어장</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.top{
background:linear-gradient(135deg,#5b7cff,#7c4dff);
color:white;
padding:30px;
border-radius:25px;
}

h1{
margin:0;
}

button{
cursor:pointer;
border:none;
padding:10px 15px;
border-radius:10px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-top:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.word{
font-size:24px;
font-weight:bold;
}

.mean{
margin-top:5px;
color:#555;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="wrap">

<div class="top">
<h1>서수원 JLS 단어장</h1>
<p>교재 선택 → 레벨 → 챕터 → 단어 테스트</p>
</div>

<div id="book"></div>
<div id="level"></div>
<div id="chapter"></div>
<div id="words"></div>

</div>

<script>

const CSV_URL="vocab.csv"

let data=[]
let book=""
let level=""
let chapter=""

async function load(){

let res=await fetch(CSV_URL)
let text=await res.text()

let rows=text.split("\n")
let header=rows[0].split(",")

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",")

let obj={}

header.forEach((h,index)=>{
obj[h.trim()]=cols[index]
})

data.push(obj)

}

renderBooks()

}

function renderBooks(){

let books=[...new Set(data.map(v=>v["교재"]))]

let html="<div class='grid'>"

books.forEach(b=>{
html+=`
<div class="card">
<button onclick="selectBook('${b}')">${b}</button>
</div>
`
})

html+="</div>"

document.getElementById("book").innerHTML=html

}

function selectBook(b){

book=b

let levels=[...new Set(data.filter(v=>v["교재"]==b).map(v=>v["레벨"]))]

let html="<div class='grid'>"

levels.forEach(l=>{
html+=`
<div class="card">
<button onclick="selectLevel('${l}')">${l}</button>
</div>
`
})

html+="</div>"

document.getElementById("level").innerHTML=html

}

function selectLevel(l){

level=l

let chapters=[...new Set(data.filter(v=>v["교재"]==book && v["레벨"]==l).map(v=>v["Chapter"]))]

let html="<div class='grid'>"

chapters.forEach(c=>{
html+=`
<div class="card">
<button onclick="selectChapter('${c}')">${c}</button>
</div>
`
})

html+="</div>"

document.getElementById("chapter").innerHTML=html

}

function selectChapter(c){

chapter=c

let words=data.filter(v=>
v["교재"]==book &&
v["레벨"]==level &&
v["Chapter"]==chapter
)

let html=""

words.forEach(w=>{
html+=`
<div class="card">
<div class="word">${w["영어"]}</div>
<div class="mean">${w["뜻"]}</div>
</div>
`
})

document.getElementById("words").innerHTML=html

}

load()

</script>

</body>
</html>
